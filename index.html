<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="grid.css">
    <title>health panel</title>
</head>

<body>
    <div class="container">
        <div class="bg2">
            <h2>16 <span>| 24</span></h2>
            <p>goals completed</p>
        </div>
        <div class="bg1">
            <h2><i class="fas fa-battery-three-quarters"></i></h2>
            <p>Respiration</p>
        </div>
        <div class="bg1">
            <h2><i class="fas fa-running"> </i></h2>
            <p>miles</p>
        </div>
        <div class="bg2">
            <h2>36 &deg;</h2>
            <p>Temperature</p>
        </div>
        <div class="bg2">
            <h2><i class="fas fa-bed"></i></h2>
            <p>Sleep Keep</p>
        </div>
        <div class="bg1">
            <h2>170 <span>lbs</span></h2>
            <p>Weight</p>
        </div>

        <div class="bg2">
            <h2>28 <span>%</span></h2>
            <p>Fat Percentage</p>
        </div>
        <div class="bg1">
            <h2>121 <span>mg/dL</span></h2>
            <p>blood Glucose</p>
        </div>
        <div class="bg1">
            <h2>680 <span>kcal</span></h2>
            <p>Calories</p>
        </div>
        <div class="bg1">
            <h2><i class="fa-solid fa-dumbbell"></i></h2>
            <p>Workouts</p>
        </div>
        <div class="bg2">
            <h2>91 <span>%</span></h2>
            <p>Body Hydration</p>
        </div>



    </div>
</body>

</html>
